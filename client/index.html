<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Traffic Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo">
        🚦 Smart City Traffic Management
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Routes</a>
        <a href="#">Traffic</a>
        <a href="#">Dashboard</a>
    </nav>
</header>

<section class="hero">

    <div class="search-card">

        <h2>Find Best Route</h2>

        <input type="text" id="source" placeholder="Enter Source City">

        <input type="text" id="destination" placeholder="Enter Destination City">

        <select id="vehicle">
            <option>Car</option>
            <option>Bike</option>
            <option>Bus</option>
        </select>

        <button onclick="findRoute()">Find Route</button>

    </div>

</section>

<section class="graph-card">

    <h2>City Network</h2>

    <canvas id="graphCanvas" width="900" height="450"></canvas>

</section>

<section class="result-card">

    <h2>Route Details</h2>

    <div id="result">

        Enter source and destination to search route.

    </div>

</section>

<script src="js/app.js"></script>
<script src="js/app.js"></script>
<script src="js/graph.js"></script>

</body>
</html>
